name: CD - DEV

on:
  workflow_run:
    workflows: ["CI - Build and Test (.NET 8)"]
    branches:
      - develop
    types:
      - completed

jobs:

  deploy-dev:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: personservice
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set commit SHA
        run: echo "COMMIT_SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/PersonService.Api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:dev-${{ env.COMMIT_SHA }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest